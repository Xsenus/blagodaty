name: Deploy Production

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/frontend/camp-web/package-lock.json
            src/frontend/lk-web/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install frontend dependencies
        run: |
          npm ci --prefix src/frontend/camp-web
          npm ci --prefix src/frontend/lk-web

      - name: Build frontend applications
        run: |
          npm run build --prefix src/frontend/camp-web
          npm run build --prefix src/frontend/lk-web

      - name: Publish API
        run: |
          dotnet publish src/backend/Blagodaty.Api/Blagodaty.Api.csproj \
            -c Release \
            -o out/api-publish \
            -p:UseAppHost=false

      - name: Package release artifacts
        run: |
          mkdir -p out/deploy
          tar -C out/api-publish -czf out/deploy/api-publish.tar.gz .
          tar -C src/frontend/camp-web/dist -czf out/deploy/camp-dist.tar.gz .
          tar -C src/frontend/lk-web/dist -czf out/deploy/lk-dist.tar.gz .

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          PORT="${VPS_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archives
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          PORT="${VPS_SSH_PORT:-22}"
          REMOTE_DIR="/tmp/blagodaty-deploy-${GITHUB_SHA}"
          echo "REMOTE_DIR=${REMOTE_DIR}" >> "$GITHUB_ENV"
          ssh -p "$PORT" "${VPS_USER}@${VPS_HOST}" "mkdir -p '${REMOTE_DIR}'"
          scp -P "$PORT" \
            out/deploy/api-publish.tar.gz \
            out/deploy/camp-dist.tar.gz \
            out/deploy/lk-dist.tar.gz \
            infra/deploy/production-deploy.sh \
            "${VPS_USER}@${VPS_HOST}:${REMOTE_DIR}/"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          PORT="${VPS_SSH_PORT:-22}"
          ssh -p "$PORT" "${VPS_USER}@${VPS_HOST}" "\
            chmod +x '${REMOTE_DIR}/production-deploy.sh' && \
            '${REMOTE_DIR}/production-deploy.sh' '${REMOTE_DIR}' '${GITHUB_SHA}' && \
            rm -rf '${REMOTE_DIR}'"
